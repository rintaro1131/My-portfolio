    <style>
      :root {
        --max-w: 1160px;
        --pad-x: 24px;
        --gap: 48px;
        --fg: #111;
        --sub: #8c8f93;
        --line: #e9eaec;
        --muted: #f5f6f7;
        --bg: #fff;
        --ring: #111;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--fg);
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Noto Sans JP, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.6;
        letter-spacing: 0.01em; /* JP: 詰めすぎない */
      }
      img { max-width: 100%; display: block; }
      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; text-underline-offset: 2px; }
      a:focus-visible, button:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
      }
      .container {
        max-width: var(--max-w);
        padding-inline: var(--pad-x);
        margin-inline: auto;
      }
      /* Header */
      header.site-header { margin-top: 28px; }
      .site-header .inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        font-weight: 500;
        letter-spacing: 0.08em; /* 英字は少し広め */
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      nav.primary-nav {
        display: flex;
        align-items: center;
        gap: 18px;
        color: var(--sub);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
      }
      nav.primary-nav a { padding: 6px 8px; border-radius: 8px; }
      nav.primary-nav a:hover { background: #f8f9fa; color: #333; text-decoration: none; }
      .contact-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 14px;
        color: #444;
        background: transparent;
        transition: background-color .2s ease, color .2s ease;
      }
      .contact-btn:hover { background: #f7f8f9; color: #111; }

      /* Hero */
      section.hero {
        margin-top: 44px;
        background: var(--muted);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }
      .hero .inner {
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        gap: var(--gap);
        min-height: clamp(420px, 58vh, 520px);
        align-items: center;
      }
      .hero-left h1 {
        margin: 0 0 8px 0;
        font-size: clamp(32px, 4.2vw, 40px);
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: 0.02em;
      }
      .hero-left .role { font-size: 18px; font-weight: 500; color: #2c2e31; letter-spacing: 0.02em; }
      .hero-left .tagline { margin-top: 10px; color: var(--sub); font-size: 14px; }
      .hero-actions { margin-top: 18px; display: flex; align-items: center; gap: 12px; }
      .hero-actions a { font-size: 12px; color: var(--sub); letter-spacing: 0.08em; }
      .hero-actions a:hover { color: #4a4d52; }

      .hero-right {
        align-self: stretch;
        display: flex;
        align-items: center;
      }
      .hero-frame {
        width: 100%;
        aspect-ratio: 16 / 10;
        border: 1px solid var(--line);
        background-color: #fafbfc;
        background-image: url('assets/top.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
        overflow: hidden;
      }
      .hero-accent {
        position: absolute;
        left: 50%;
        bottom: -18px;
        width: 1px; height: 36px;
        background: var(--line);
        transform: translateX(-50%);
      }

      /* Section heading */
      .section-heading { text-align: center; padding-top: 96px; padding-bottom: 56px; }
      .section-heading .en { color: #2c2e31; font-weight: 500; letter-spacing: 0.12em; font-size: 12px; }
      .section-heading .ja { color: var(--sub); font-size: 12px; margin-top: 6px; }

      /* Grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(28px, 4.2vw, var(--gap));
      }
      .card {
        border: 1px solid rgba(233,234,236,0.8);
        border-radius: 8px;
        overflow: clip;
        background: #fff;
        transition: transform .05s ease;
      }
      .card:hover { transform: translateY(-1px); }
      .card a { display: block; height: 100%; color: inherit; }
      .thumb {
        aspect-ratio: 16 / 10;
        background: var(--muted);
        border-bottom: 1px solid var(--line);
        overflow: hidden;
      }
      .thumb img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.98); transition: filter .2s ease; }
      .card:hover .thumb img { filter: brightness(1.03); }
      .meta { padding: 14px 14px 16px; }
      .title { font-size: 16px; font-weight: 500; letter-spacing: 0.02em; margin: 0; }
      .card:hover .title { text-decoration: underline; text-underline-offset: 2px; }
      .sub { color: var(--sub); font-size: 12px; margin-top: 8px; letter-spacing: 0.01em; }

      .empty { text-align: center; color: var(--sub); padding: 40px 0 80px; }

      /* Footer */
      footer.site-footer { margin-top: 80px; border-top: 1px solid var(--line); }
      .footer-top { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; }
      .foot-left { display: flex; align-items: center; gap: 12px; }
      .avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line); background: var(--muted); overflow: hidden; }
      .foot-name { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; }
      .social { display: flex; align-items: center; gap: 12px; color: var(--sub); font-size: 12px; }
      .social a { padding: 6px 6px; border-radius: 8px; }
      .social a:hover { background: #f8f9fa; color: #333; text-decoration: none; }
      .foot-right { color: var(--sub); font-size: 12px; display: flex; gap: 14px; letter-spacing: 0.08em; }
      .foot-right a { padding: 6px 8px; border-radius: 8px; }
      .foot-right a:hover { background: #f8f9fa; color: #333; text-decoration: none; }
      .foot-line { height: 1px; background: var(--line); }
      .foot-copy { text-align: center; color: var(--sub); font-size: 12px; padding: 12px 0 28px; }

      /* Utilities */
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

      /* Responsive */
      @media (max-width: 960px) {
        .hero .inner { grid-template-columns: 1fr; gap: 28px; padding-block: 28px; }
        .hero-right { order: -1; }
        .section-heading { padding-top: 72px; padding-bottom: 44px; }
        .grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 640px) {
        header.site-header { margin-top: 22px; }
        .grid { grid-template-columns: 1fr; }
        .foot-right { display: none; }
      }
    </style>

    <script>
      (function() {
        const profile = JSON.parse(document.getElementById('profile').textContent);
        const projects = JSON.parse(document.getElementById('projects').textContent);

        // Set dynamic URL in OGP
        const ogUrl = document.getElementById('og-url');
        if (ogUrl) ogUrl.setAttribute('content', location.href);

        // Wire contact and hero links
        const contact = (profile.links && profile.links.email) || '#';
        const gh = (profile.links && profile.links.github) || '#';
        const xurl = (profile.links && profile.links.x) || '';
        
        const contactBtn = document.getElementById('contactBtn');
        const footContact = document.getElementById('footContact');
        const footGithub = document.getElementById('footGithub');
        const footX = document.getElementById('footX');
        
        if (contactBtn) { contactBtn.href = contact; contactBtn.setAttribute('rel','noopener noreferrer'); contactBtn.setAttribute('target','_blank'); }
        if (footContact) { footContact.href = contact; footContact.setAttribute('rel','noopener noreferrer'); footContact.setAttribute('target','_blank'); }
        if (footGithub) footGithub.href = gh;
        if (xurl) { footX.href = xurl; footX.hidden = false; }

        // Footer year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Avatar generation (initial circle) when empty
        function generateAvatarDataURL(name, size = 56) {
          const c = document.createElement('canvas');
          c.width = c.height = size;
          const ctx = c.getContext('2d');
          // Background circle
          ctx.fillStyle = '#f5f6f7';
          ctx.fillRect(0,0,size,size);
          ctx.fillStyle = '#e9eaec';
          ctx.beginPath();
          ctx.arc(size/2, size/2, size/2 - 1, 0, Math.PI*2);
          ctx.fill();
          ctx.strokeStyle = '#e5e6e8';
          ctx.stroke();
          // Initial
          const initial = (name || '').trim().charAt(0) || '?';
          ctx.fillStyle = '#6b6f76';
          ctx.font = `bold ${Math.floor(size*0.44)}px -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Noto Sans JP, Helvetica, Arial, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(initial, size/2, size/2 + 1);
          return c.toDataURL('image/png');
        }

        // Placeholder thumbnail with X
        function generateThumbPlaceholder(w = 1200, h = 750) {
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const ctx = c.getContext('2d');
          ctx.fillStyle = '#e9eaec';
          ctx.fillRect(0,0,w,h);
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = Math.max(1, Math.floor(w/600));
          ctx.beginPath();
          ctx.moveTo(0,0); ctx.lineTo(w,h);
          ctx.moveTo(w,0); ctx.lineTo(0,h);
          ctx.stroke();
          return c.toDataURL('image/png');
        }

        // Render projects
        const grid = document.getElementById('grid');
        const empty = document.getElementById('empty');
        const sorted = projects.slice().sort((a,b) => new Date(b.date) - new Date(a.date));
        if (!sorted.length) {
          empty.hidden = false;
        } else {
          const frag = document.createDocumentFragment();
          for (const p of sorted) {
            const a = document.createElement('a');
            a.href = p.href || '#';
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.setAttribute('aria-label', p.title);

            const card = document.createElement('article');
            card.className = 'card';
            card.appendChild(a);

            const figure = document.createElement('div');
            figure.className = 'thumb';
            const img = document.createElement('img');
            img.loading = 'lazy';
            img.decoding = 'async';
            img.alt = p.title || 'Project thumbnail';
            img.src = p.thumb && p.thumb.trim() ? p.thumb : generateThumbPlaceholder();
            figure.appendChild(img);

            const meta = document.createElement('div');
            meta.className = 'meta';
            const h3 = document.createElement('h3');
            h3.className = 'title';
            h3.textContent = p.title;
            const sub = document.createElement('div');
            sub.className = 'sub';
            const tags = Array.isArray(p.tags) ? p.tags.join(' / ') : '';
            sub.textContent = [p.summary, tags].filter(Boolean).join(' ・ ');
            meta.appendChild(h3);
            meta.appendChild(sub);

            a.appendChild(figure);
            a.appendChild(meta);
            frag.appendChild(card);
          }
          grid.appendChild(frag);
        }

        // Inject avatar
        const avatarEl = document.getElementById('footAvatar');
        const useAvatar = (profile.avatar || '').trim() || generateAvatarDataURL(profile.name, 56);
        if (avatarEl) avatarEl.src = useAvatar;

        // JSON-LD (Person + CreativeWork[])
        try {
          const person = {
            '@context': 'https://schema.org',
            '@type': 'Person',
            name: profile.name,
            jobTitle: profile.role,
            description: profile.tagline,
            url: location.href,
            email: profile.links && profile.links.email ? profile.links.email.replace('mailto:', '') : undefined,
            sameAs: [profile.links?.github, profile.links?.x, profile.links?.linkedin].filter(Boolean),
            hasPart: sorted.map(p => ({
              '@type': 'CreativeWork',
              name: p.title,
              url: p.href,
              thumbnailUrl: (p.thumb && p.thumb.trim()) ? p.thumb : generateThumbPlaceholder(1200, 750),
              datePublished: p.date,
              keywords: Array.isArray(p.tags) ? p.tags.join(', ') : undefined,
              about: p.summary
            }))
          };
          const ld = document.createElement('script');
          ld.type = 'application/ld+json';
          ld.textContent = JSON.stringify(person);
          document.head.appendChild(ld);
        } catch (e) { /* no-op */ }
      })();
    </script>
